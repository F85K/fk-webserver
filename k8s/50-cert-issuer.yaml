# Cert-Manager DuckDNS ClusterIssuer (Let's Encrypt + DNS-01)
# Uses DuckDNS webhook for DNS-01 ACME validation
# Domain: fk-webserver.duckdns.org
# Token: Set via DUCKDNS_TOKEN environment variable in deployment script
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: cert-manager-webhook-duckdns-production
spec:
  acme:
    email: ${LETSENCRYPT_EMAIL}
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-duckdns-key
    solvers:
      - dns01:
          webhook:
            groupName: acme.d35iq2jt.com
            solverName: duckdns
            config:
              tokenSecretRef:
                name: duckdns-token
                key: token
