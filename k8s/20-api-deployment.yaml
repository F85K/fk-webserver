# FastAPI Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fk-api
  namespace: fk-webstack
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fk-api
  template:
    metadata:
      labels:
        app: fk-api
    spec:
      containers:
        - name: fk-api
          image: fk-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            # Mongo connection settings
            - name: MONGO_URL
              value: mongodb://fk-mongodb:27017
            - name: MONGO_DB
              value: fkdb
            - name: MONGO_COLLECTION
              value: profile
            - name: NAME_KEY
              value: name
            - name: DEFAULT_NAME
              value: Frank Koch
          livenessProbe:
            # Restart on failure
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            # Traffic only when healthy
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
